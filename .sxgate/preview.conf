# .sxgate/preview.conf — host hatchery as a password-gated sxgate preview.
#
# Sourced shell fragment; the engine expands {worktree} {state} {zone} {port}.
# hatchery serves its own SPA + /api + /ws, so MODE=proxy (pure reverse-proxy to
# the backend; Caddy forwards the /ws upgrade and the Basic-Auth header).
#
# The Basic-Auth password is NOT in this file (it would be committed). hatchery
# reads it from /etc/hatchery/password (root-managed, readable by sxgate-preview).
# Add an Anthropic API key later the same way: put it in /etc/hatchery/anthropic-key
# (or add ANTHROPIC_API_KEY=... to RUN_ENV) to enable the AI Traverser.

SERVICE=hatchery
MODE=proxy

# Build the SPA, then the release binary. cargo runs as root here, so isolate its
# home to the preview state dir and point rustup at the installed toolchain.
# Copy the lakearch spec into the worktree (the sxgate-preview user can't traverse
# /home/nanu), build the SPA, then the release binary. cargo runs as root here, so
# isolate its home to the preview state dir and put the rustup proxy on PATH.
BUILD='mkdir -p {worktree}/semantics && cp /home/nanu/lakearch/semantics/lakearch.md /home/nanu/lakearch/semantics/canonical-encoding.md {worktree}/semantics/ && cd {worktree}/frontend && /usr/bin/npm ci --no-audit --no-fund && /usr/bin/npm run build && cd {worktree} && CARGO_HOME={state}/cargo RUSTUP_HOME=/home/nanu/.rustup PATH="/home/nanu/.cargo/bin:$PATH" cargo build --release'

# Backend binds the engine-assigned loopback {port}; data + frontend + spec live
# under the worktree/state so a `down` cleans everything up.
RUN='{worktree}/target/release/hatchery-server --addr 127.0.0.1:{port} --data-dir {state}/data --frontend {worktree}/frontend/dist --semantics-dir {worktree}/semantics'
RUN_CWD='{worktree}'

# Readiness probe (open, no auth).
HEALTHCHECK=/healthz
